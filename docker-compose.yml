  services:

    db:
    
      image: postgres:16
      container_name: kursach-db
      restart: always
      environment:
        POSTGRES_DB: ${POSTGRES_DB}
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      volumes:
        - pgdata:/var/lib/postgresql/data
      ports:
        - "${POSTGRES_PORT}:{POSTGRES_PORT}"

    web:
      build: .
      container_name: kursach-web
      restart: always
      command: gunicorn mysite.wsgi:application --bind 0.0.0.0:8000 --workers 10 --threads 2
      volumes:
        - .:/app
        - static_volume:/app/staticfiles
        - media_volume:/app/media
      depends_on:
        - db
        - onlyoffice
      env_file:
        - .env

    onlyoffice:
      image: onlyoffice/documentserver
      container_name: onlyoffice
      restart: always
      ports:
        - "8080:80"
      environment:
        JWT_ENABLED: "false"
        USE_UNAUTHORIZED_STORAGE: "true" 
        ALLOW_PRIVATE_IP_ADDRESS: "true"
        EXAMPLE_DISABLE: "true"
    nginx:
      image: nginx:latest
      container_name: kursach-nginx
      restart: always
      ports:
        - "80:80"
      volumes:
        - ./nginx.conf:/etc/nginx/conf.d/default.conf
        - static_volume:/app/staticfiles
        - media_volume:/app/media
      depends_on:
        - web


  volumes:
    pgdata:
    static_volume:
    media_volume: